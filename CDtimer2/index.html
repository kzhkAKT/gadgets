<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高専生向け 決戦の日までのカウントダウン</title>
    <!-- Tailwind CSSを使用してデザインを整えます -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* カスタムフォントや微調整が必要な場合はここに追記 */
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-white rounded-xl shadow-lg overflow-hidden">
        <div class="bg-blue-600 p-6 text-white text-center">
            <h1 class="text-2xl font-bold">高専生カウントダウン</h1>
            <p class="text-sm mt-2 opacity-90">就活・編入準備が本格化する<br>「4年生の3月31日」までの残り日数</p>
        </div>

        <div class="p-6">
            <div class="mb-4">
                <label for="enrollmentYear" class="block text-sm font-medium text-gray-700 mb-1">
                    入学年度（西暦）を入力してください
                </label>
                <input 
                    type="number" 
                    id="enrollmentYear" 
                    placeholder="例: 2024" 
                    min="1962" 
                    max="2100"
                    class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-colors"
                >
            </div>

            <div class="mb-6">
                <label for="achievementTestDate" class="block text-sm font-medium text-gray-700 mb-1">
                    到達度試験の日程（任意）
                </label>
                <input 
                    type="date" 
                    id="achievementTestDate" 
                    class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-colors"
                >
            </div>

            <button 
                id="calculateBtn"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-md transition-colors"
            >
                残り日数を計算する
            </button>

            <!-- エラーメッセージ表示エリア -->
            <p id="errorMsg" class="text-red-500 text-sm mt-3 text-center hidden"></p>

            <!-- 結果表示エリア -->
            <div id="resultArea" class="mt-6 space-y-4 hidden">
                <!-- 4年生3月31日までのカウントダウン -->
                <div class="p-4 bg-slate-100 rounded-md text-center">
                    <p class="text-gray-600 text-sm mb-1" id="targetDateDisplay"></p>
                    <div class="text-3xl font-bold text-gray-800 my-2">
                        あと <span id="daysRemaining" class="text-blue-600 text-5xl"></span> 日
                    </div>
                    <p class="text-gray-600 text-sm" id="messageDisplay"></p>
                </div>

                <!-- 到達度試験までのカウントダウン -->
                <div id="achievementResultArea" class="p-4 bg-amber-50 border border-amber-200 rounded-md text-center hidden">
                    <p class="text-amber-800 text-sm mb-1" id="achievementTargetDisplay"></p>
                    <div class="my-3 flex flex-col items-center justify-center">
                        <div class="flex items-baseline mb-1">
                            <span class="text-xl font-bold mr-2 text-gray-700">あと</span>
                            <span id="achievementDaysRemaining" class="text-5xl font-bold tabular-nums"></span>
                            <span class="text-xl font-bold ml-1 text-gray-700">日</span>
                        </div>
                        <div id="achievementTimeContainer" class="flex items-baseline">
                            <span id="achievementHoursRemaining" class="text-4xl font-bold tabular-nums"></span><span class="text-lg mx-1 font-bold text-gray-700">時間</span>
                            <span id="achievementMinutesRemaining" class="text-4xl font-bold tabular-nums"></span><span class="text-lg mx-1 font-bold text-gray-700">分</span>
                            <span id="achievementSecondsRemaining" class="text-4xl font-bold tabular-nums"></span><span class="text-lg ml-1 font-bold text-gray-700">秒</span>
                        </div>
                    </div>
                    <p class="text-amber-800 text-sm mt-2" id="achievementMessageDisplay"></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const calculateBtn = document.getElementById('calculateBtn');
            const enrollmentYearInput = document.getElementById('enrollmentYear');
            const achievementTestDateInput = document.getElementById('achievementTestDate');
            
            // UIエレメント
            const errorMsg = document.getElementById('errorMsg');
            const resultArea = document.getElementById('resultArea');
            const targetDateDisplay = document.getElementById('targetDateDisplay');
            const daysRemaining = document.getElementById('daysRemaining');
            const messageDisplay = document.getElementById('messageDisplay');

            const achievementResultArea = document.getElementById('achievementResultArea');
            const achievementTargetDisplay = document.getElementById('achievementTargetDisplay');
            const achievementDaysRemaining = document.getElementById('achievementDaysRemaining');
            const achievementHoursRemaining = document.getElementById('achievementHoursRemaining');
            const achievementMinutesRemaining = document.getElementById('achievementMinutesRemaining');
            const achievementSecondsRemaining = document.getElementById('achievementSecondsRemaining');
            const achievementTimeContainer = document.getElementById('achievementTimeContainer');
            const achievementMessageDisplay = document.getElementById('achievementMessageDisplay');

            let countdownTimer = null;

            calculateBtn.addEventListener('click', () => {
                // UIリセット
                errorMsg.classList.add('hidden');
                errorMsg.textContent = '';
                resultArea.classList.add('hidden');
                achievementResultArea.classList.add('hidden');

                if (countdownTimer) {
                    clearInterval(countdownTimer);
                }

                // 入力値の取得
                const inputVal = enrollmentYearInput.value;
                const year = parseInt(inputVal, 10);

                // セキュリティと妥当性の検証 (バリデーション)
                // - isNaNで数値かチェック
                // - 高専制度開始(1962年)から未来(2100年)までの範囲に制限
                if (isNaN(year) || year < 1962 || year > 2100) {
                    errorMsg.textContent = '有効な入学年度（西暦1962〜2100）を半角数字で入力してください。';
                    errorMsg.classList.remove('hidden');
                    return;
                }

                // 計算ロジック
                // 入学が Y 年の場合、4年生になるのは Y + 3 年。
                // その年度末（3月31日）は Y + 4 年の3月31日となる。
                const targetYear = year + 4;
                
                // JavaScriptのDateオブジェクトの「月」は0始まり (0 = 1月, 2 = 3月)
                // 時間を0時0分0秒にセットして、純粋な日付の差分を計算しやすくする
                const targetDate = new Date(targetYear, 2, 31, 0, 0, 0, 0); 
                
                const today = new Date();
                // 今日も0時0分0秒に正規化
                const todayMidnight = new Date(today.getFullYear(), today.getMonth(), today.getDate(), 0, 0, 0, 0);

                // ミリ秒の差分から日数を計算
                const diffTime = targetDate.getTime() - todayMidnight.getTime();
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

                // 結果の表示処理 (セキュリティのため必ず textContent を使用)
                targetDateDisplay.textContent = `目標日: ${targetYear}年3月31日`;
                
                if (diffDays > 0) {
                    daysRemaining.textContent = diffDays;
                    messageDisplay.textContent = '準備を始めるための決戦の日です！';
                    daysRemaining.className = "text-blue-600 text-5xl"; // 色を戻す
                } else if (diffDays === 0) {
                    daysRemaining.textContent = "0";
                    messageDisplay.textContent = '今日がまさにその日です！';
                    daysRemaining.className = "text-green-600 text-5xl";
                } else {
                    daysRemaining.textContent = Math.abs(diffDays);
                    messageDisplay.textContent = '日はすでに過ぎています。今すぐ動き出しましょう！';
                    daysRemaining.className = "text-red-600 text-5xl";
                }

                // 到達度試験の計算
                const achievementVal = achievementTestDateInput.value;
                if (achievementVal) {
                    const achTargetDate = new Date(achievementVal);
                    // 時間を0時に正規化
                    achTargetDate.setHours(0, 0, 0, 0);
                    
                    const achYear = achTargetDate.getFullYear();
                    const achMonth = achTargetDate.getMonth() + 1;
                    const achDate = achTargetDate.getDate();
                    
                    achievementTargetDisplay.textContent = `到達度試験: ${achYear}年${achMonth}月${achDate}日`;
                    
                    const updateAchievementCountdown = () => {
                        const now = new Date();
                        const diffTime = achTargetDate.getTime() - now.getTime();
                        
                        let areaBgClass = "";
                        let textClass = "";
                        let mainColorClass = "";

                        if (diffTime > 0) {
                            achievementTimeContainer.classList.remove('hidden');
                            
                            const d = Math.floor(diffTime / (1000 * 60 * 60 * 24));
                            const h = Math.floor((diffTime % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                            const m = Math.floor((diffTime % (1000 * 60 * 60)) / (1000 * 60));
                            const s = Math.floor((diffTime % (1000 * 60)) / 1000);
                            
                            achievementDaysRemaining.textContent = d;
                            achievementHoursRemaining.textContent = String(h).padStart(2, '0');
                            achievementMinutesRemaining.textContent = String(m).padStart(2, '0');
                            achievementSecondsRemaining.textContent = String(s).padStart(2, '0');
                            
                            if (d > 14) {
                                achievementMessageDisplay.textContent = '試験に向けて計画的に学習を進めましょう！';
                                mainColorClass = "text-amber-600";
                                areaBgClass = "bg-amber-50 border-amber-200";
                                textClass = "text-amber-800";
                            } else {
                                achievementMessageDisplay.textContent = '試験まで2週間を切りました！ラストスパートです！';
                                mainColorClass = "text-red-600 font-bold";
                                areaBgClass = "bg-red-50 border-red-200";
                                textClass = "text-red-800";
                            }
                        } else {
                            // 当日または過ぎている場合
                            achievementTimeContainer.classList.add('hidden');
                            
                            // 今日を基準に経過日数を計算
                            const today = new Date();
                            today.setHours(0, 0, 0, 0);
                            const achDiffDays = Math.ceil((achTargetDate.getTime() - today.getTime()) / (1000 * 60 * 60 * 24));
                            
                            if (achDiffDays === 0) {
                                achievementDaysRemaining.textContent = "0";
                                achievementMessageDisplay.textContent = '今日が到達度試験当日です！落ち着いて頑張ってください！';
                                mainColorClass = "text-green-600";
                                areaBgClass = "bg-green-50 border-green-200";
                                textClass = "text-green-800";
                            } else {
                                achievementDaysRemaining.textContent = Math.abs(achDiffDays);
                                achievementMessageDisplay.textContent = '試験は終了しました。お疲れ様でした！';
                                mainColorClass = "text-gray-500";
                                areaBgClass = "bg-gray-50 border-gray-200";
                                textClass = "text-gray-600";
                            }
                            
                            if (countdownTimer) clearInterval(countdownTimer);
                        }
                        
                        // クラスの適用 (時間・分・秒の表示色も同期、等幅フォント設定を追加)
                        achievementDaysRemaining.className = `text-5xl font-bold tabular-nums ${mainColorClass}`;
                        achievementHoursRemaining.className = `text-4xl font-bold tabular-nums ${mainColorClass}`;
                        achievementMinutesRemaining.className = `text-4xl font-bold tabular-nums ${mainColorClass}`;
                        achievementSecondsRemaining.className = `text-4xl font-bold tabular-nums ${mainColorClass}`;
                        
                        achievementTargetDisplay.className = `text-sm mb-1 ${textClass}`;
                        achievementMessageDisplay.className = `text-sm mt-2 ${textClass}`;
                        achievementResultArea.className = `p-4 border rounded-md text-center ${areaBgClass}`;
                    };

                    updateAchievementCountdown(); // 初回実行
                    countdownTimer = setInterval(updateAchievementCountdown, 1000); // 1秒ごとに更新
                    
                    achievementResultArea.classList.remove('hidden');
                }

                resultArea.classList.remove('hidden');
            });

            // Enterキーでも計算できるようにする
            const triggerCalc = (e) => {
                if (e.key === 'Enter') {
                    calculateBtn.click();
                }
            };
            enrollmentYearInput.addEventListener('keypress', triggerCalc);
            achievementTestDateInput.addEventListener('keypress', triggerCalc);

            // --- URLパラメータからの初期値設定と自動計算 ---
            const urlParams = new URLSearchParams(window.location.search);
            const yearParam = urlParams.get('year');
            const testDateParam = urlParams.get('testdate');

            let autoCalculate = false;

            // 入学年度の引数 (?year=2025) がある場合
            if (yearParam) {
                enrollmentYearInput.value = yearParam;
                autoCalculate = true;
            }

            // 到達度試験日の引数 (?testdate=20260727 または 2026-07-27) がある場合
            if (testDateParam) {
                let formattedDate = testDateParam;
                // 20260727 のような8桁の数字文字列を 2026-07-27 フォーマットに変換
                if (/^\d{8}$/.test(testDateParam)) {
                    formattedDate = `${testDateParam.substring(0, 4)}-${testDateParam.substring(4, 6)}-${testDateParam.substring(6, 8)}`;
                }
                achievementTestDateInput.value = formattedDate;
                autoCalculate = true; // 到達度試験日だけでも自動計算を試みる
            }

            // パラメータがセットされていたら自動的に計算ボタンをクリック
            if (autoCalculate) {
                calculateBtn.click();
            }
        });
    </script>
</body>
</html>
